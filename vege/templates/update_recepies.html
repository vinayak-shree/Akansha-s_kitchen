{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin@kitchen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<style>
    body{
            background-image: url("{% static 'images/bg.png' %}");
    }
    .container{
       width: 26rem;
       padding-left: 20px;
       padding-right: 20px;
       background-color: white;
       margin-top: 2rem;
       margin-left: 30rem;
       padding-top: 10px;
       padding-bottom: 20px;
       margin-bottom: 1rem;
       box-shadow: 10px 10px 100px 0.1px black;
       border-radius: 10px;
    }
    .zoom
    {
      /* animation-name: zoomIn; */
      animation: zoomIn 2s linear infinite;
    }
    @keyframes zoomIn {
      0%
      {
          transform: scaleX(0.9);
      }
      50%{
          transform: scaleX(1);
      }
      100%{
          transform: scaleX(0.9);
      }
    }
</style>
</head>
<body>
  <!-- we use post method to send data from frontend to backend -->
   <!-- uploaded file will only work if we use multipart form data -->
<form method="post" enctype="multipart/form-data">
    
<!-- important -->
 {% csrf_token %}

    <div class="container"><h2 class="zoom">Edit Recepie &#128523</h2>
        <hr>
  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">Recepie Name</label>
    <input type="recepie_name" value="{{recepie.recepie_name}}" name="recepie_name" class="form-control" id="exampleInputPassword1">
  </div>


<div class="mb-3">
    <label for="recipeCategory" class="form-label">
        Recipe Category
    </label>

    <select class="form-select" value="{{recepie.recepie_category}}" id="recipeCategory" name="recepie_category">
        <option selected disabled>Select a category</option>
        <option value="Breakfast">Breakfast</option>
        <option value="South Indian">South Indian</option>
        <option value="North Indian">North Indian</option>
        <option value="Sweets & Desserts">Sweets & Desserts</option>
        <option value="Snacks">Snacks</option>
        <option value="Street Food">Street Food</option>
        <option value="Beverages">Beverages</option>
        <option value="Festival Special">Festival Special</option>
    </select>
</div>

<div class="mb-3">
    <label for="image" class="form-label">Upload Recepie new Yotube url</label>
    <input type="recepie_link" value="{{recepie.recepie_link}}" name="recepie_link" class="form-control">
  </div>


<div class="mb-3">
  <label for="exampleFormControlTextarea1" class="form-label">Description</label>
  <textarea name="recepie_description" class="form-control" id="exampleFormControlTextarea1" rows="3">{{recepie.recepie_description}}</textarea>
</div>

  <div class="mb-3">
    <label for="image" class="form-label">Upload New Image</label>
    <input type="file" name="recepie_image" class="form-control">
  </div>


    <button type="submit" class="btn btn-primary">Update Recepie</button>
    <button type="submit" class="btn btn-danger" style="margin-left: 6rem;"><a href="/all_recepies/" style="text-decoration: none; color: white;">All recepies</a></button>
</div>
