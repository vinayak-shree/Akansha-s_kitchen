{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
   
        body{
            background-image:
            linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.4)),
            url("{% static 'images/bg.png' %}");

            background-size: cover;
            background-position: center;
            min-height: 100vh;
        }

        .login-container{
            width:400px;
            margin:100px auto;
            padding:25px;
            background:white;
            border-radius:10px;
            box-shadow:0 0 20px rgba(0,0,0,.4);
        }
        p{
          color: red;
        }
    </style>

</head>
<body>

<div class="login-container">

    <h2 class="text-center">Admin Login</h2>
    <hr>

    {% if error %}
    <div class="alert alert-danger">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Username</label>
                
            <input
                type="text"
                name="username"
                class="form-control"
                required>
                <p id="emailHelp" class="form-text text-muted">Only Admins are allowed to Add Recepies !!</p>

        </div>

        <div class="mb-3">
            <label>Password</label>
            <input
                type="password"
                name="password"
                class="form-control"
                required>
        </div>

        <button class="btn btn-primary w-100">
            Login
        </button>

    </form>

</div>

</body>
</html>
